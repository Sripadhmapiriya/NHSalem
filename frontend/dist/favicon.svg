<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="24" fill="#000516" />
  <!-- Anchor Ring -->
  <circle cx="50" cy="22" r="7" stroke="#D3A25D" stroke-width="5" fill="none" />
  <!-- Stock (horizontal crossbar) -->
  <line x1="30" y1="36" x2="70" y2="36" stroke="#D3A25D" stroke-width="6" stroke-linecap="round" />
  <!-- Shank (vertical shaft) -->
  <line x1="50" y1="27" x2="50" y2="72" stroke="#D3A25D" stroke-width="6" stroke-linecap="round" />
  <!-- Flukes (curved arms) -->
  <path d="M22,50 C22,70 35,80 50,80 C65,80 78,70 78,50" stroke="#D3A25D" stroke-width="6" stroke-linecap="round" fill="none" />
  <!-- Arrow tips on flukes -->
  <path d="M17,52 L22,46 L27,52" stroke="#D3A25D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M73,52 L78,46 L83,52" stroke="#D3A25D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
